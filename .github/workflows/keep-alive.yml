name: Supabase keep-alive

on:
  schedule:
    # Runs every 5 days at 08:00 UTC — well within the 7-day inactivity window
    - cron: '0 8 */5 * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/users?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Unexpected status — check Supabase project health"
            exit 1
          fi
